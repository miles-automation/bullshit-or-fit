name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      runner_target:
        description: "Runner target for manual runs"
        required: true
        type: choice
        default: "self-hosted-canary"
        options:
          - self-hosted-canary
          - ubuntu-latest

jobs:
  check:
    runs-on: ${{ fromJSON(github.event_name == 'workflow_dispatch' && inputs.runner_target == 'ubuntu-latest' && '"ubuntu-latest"' || '["self-hosted","linux","x64","do-1gb-canary"]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt
      - name: Install frontend deps
        run: cd frontend && npm ci
      - name: Backend checks
        run: make check
      - name: Frontend build
        run: cd frontend && npm run build
